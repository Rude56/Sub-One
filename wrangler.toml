name = "sub-one"
# Worker 模式入口（内置 CF Cron 定时器）
# 如果使用 Pages 部署，请注释掉 main 和 [assets]，改用 functions/[[path]].ts
main = "worker/index.ts"
compatibility_date = "2024-06-13"

# ========== Worker 静态资源服务 ==========
# Worker 模式下通过 ASSETS binding 提供前端 SPA
[assets]
directory = "./dist"
binding = "ASSETS"

# ========== KV 命名空间绑定 ==========
# 注意：ID 需要用户在自己的 Cloudflare 后台创建 KV 后填写
[[kv_namespaces]]
binding = "SUB_ONE_KV"
id = "" # 留空，让 Fork 用户自己填写
preview_id = "" # 留空，让 Fork 用户自己填写

# ========== D1 数据库绑定（可选） ==========
# 注意：D1 数据库名称只能使用小写字母、数字、连字符和下划线
[[d1_databases]]
binding = "SUB_ONE_D1"
database_name = "sub-one-d1"
database_id = "" # 留空，让 Fork 用户自己填写

# ========== 定时触发器（CF Workers 原生 Cron） ==========
# 每 6 小时自动刷新所有订阅的流量/节点信息
# 无需外部触发器、无需 cronSecret token
[triggers]
crons = ["0 */6 * * *"]
