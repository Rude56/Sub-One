name = "sub-one"
# 使用 Pages Advanced Mode (functions/_worker.ts)
# 部署命令: wrangler pages deploy
compatibility_date = "2024-06-13"

# ========== KV 命名空间绑定 ==========
# 注意：ID 需要用户在自己的 Cloudflare 后台创建 KV 后填写
[[kv_namespaces]]
binding = "SUB_ONE_KV"
id = "" # 留空，让 Fork 用户自己填写
preview_id = "" # 留空，让 Fork 用户自己填写

# ========== D1 数据库绑定（可选） ==========
# 注意：D1 数据库名称只能使用小写字母、数字、连字符和下划线
[[d1_databases]]
binding = "SUB_ONE_D1"
database_name = "sub-one-d1"
database_id = "" # 留空，让 Fork 用户自己填写

# ========== 定时触发器 ==========
# Pages Advanced Mode 下 [triggers] 通过 wrangler pages deploy 时生效
# 也可在 Cloudflare Dashboard → Pages → 设置 → Functions → Cron 触发器中手动配置
[triggers]
crons = ["0 */24 * * *"]
